# Hugo configuration file
baseURL: "https://digitalpreservation.no/"
title: "NLN Digital preservation"

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true

# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

outputs:
  page: [html, markdown]
  section: [html, rss, markdown]

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 1
    - identifier: docs
      name: Docs
      pageRef: /docs
      weight: 2
    - identifier: about
      name: About
      pageRef: /about
      weight: 3
    - identifier: search
      name: Search
      weight: 4
      params:
        type: search
    # - name: GitHub
    #   weight: 5
    #   url: "https://github.com/NationalLibraryOfNorway/digitalpreservation-blog.nb.no"
    #   params:
    #     icon: github
    - name: Theme
      weight: 6
      params:
        type: theme-toggle
    - name: Language-switch
      weight: 7
      params:
          type: language-switch
          label: true
          icon: "globe-alt"
    - name: NB.no ↗
      weight: 8
      url: "https://nb.no/"

defaultContentLanguage: en
languages:
  en:
    label: English
    weight: 1
  nb:
    label: Norsk
    weight: 2
    title: NB Digital bevaring

params:
  images:
    - images/opengraph.webp

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/NB-svart.svg
      dark: images/NB-hvit.svg
      width: 25
    width: wide

  externalLinkDecoration: true

  page:
    width: wide
    contextMenu:
      enable: true

  footer:
    displayCopyright: false
    displayPoweredBy: false
    enableSwitches: false
    width: wide

  editURL:
    enable: false
    base: "https://github.com/NationalLibraryOfNorway/digitalpreservation-blog.nb.no/tree/main/content/"

  dateFormat: "2006-01-02"

  displayUpdatedDate: true

  theme:
    default: system
    displayToggle: true

  blog:
    list:
      displayTags: false
      displayAuthor: true
      sortBy: date # date | lastmod | publishDate | title | weight
      sortOrder: desc # or "asc"

  github:
    repository: https://github.com/NationalLibraryOfNorway/digitalpreservation-blog.nb.no
    showHistory: true
